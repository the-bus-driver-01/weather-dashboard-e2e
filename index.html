<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Switcher</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1>Theme Switcher</h1>
    <div class="theme-controls">
      <button class="theme-btn" data-theme="light" aria-label="Light theme" title="Light">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <button class="theme-btn" data-theme="dark" aria-label="Dark theme" title="Dark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="theme-btn" data-theme="system" aria-label="System theme" title="System">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="main">
    <section class="card">
      <h2>Welcome</h2>
      <p>Click a theme button above to switch between light, dark, and system themes. Your preference is saved to localStorage.</p>
    </section>
    <section class="card">
      <h2>Sample Content</h2>
      <p>This card demonstrates how theme colors apply to content areas.</p>
      <button class="btn-primary">Primary Action</button>
      <button class="btn-secondary">Secondary Action</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
