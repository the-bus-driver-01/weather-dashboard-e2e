<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake Claude API — Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1>Fake Claude API</h1>
      <div class="header-controls">
        <label class="toggle">
          <input type="checkbox" id="stream-toggle" checked>
          <span class="toggle-label">Stream</span>
        </label>
        <button id="clear-btn" class="btn btn-secondary" title="Clear conversation">Clear</button>
      </div>
    </header>

    <!-- Messages area -->
    <main class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <p>Send a message to start chatting via the local Claude proxy.</p>
        <code>POST /v1/messages → claude -p</code>
      </div>
    </main>

    <!-- Input area -->
    <form class="input-area" id="input-form">
      <textarea
        id="user-input"
        placeholder="Type a message…"
        rows="1"
        autofocus
      ></textarea>
      <button type="submit" class="btn btn-primary" id="send-btn">Send</button>
    </form>

    <!-- Status bar -->
    <footer class="status-bar">
      <span id="status">Ready</span>
      <span id="usage"></span>
    </footer>
  </div>

  <script src="content-renderer.js"></script>
  <script src="app.js"></script>
</body>
</html>
