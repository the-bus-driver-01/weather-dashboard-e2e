<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Persistence Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Data Persistence Layer</h1>
    <p class="subtitle">localStorage-backed storage with JSON serialization, TTL, and change events</p>

    <!-- Storage status -->
    <div class="status-bar">
      <span id="storage-status"></span>
      <span id="storage-size"></span>
      <span id="entry-count"></span>
    </div>

    <!-- Add/Edit form -->
    <section class="card">
      <h2>Save Data</h2>
      <form id="save-form">
        <div class="form-row">
          <label for="key-input">Key</label>
          <input type="text" id="key-input" placeholder="e.g. user_name" required>
        </div>
        <div class="form-row">
          <label for="value-input">Value</label>
          <textarea id="value-input" placeholder='Any JSON value: "hello", 42, {"name": "Alice"}, [1,2,3]' required></textarea>
        </div>
        <div class="form-row">
          <label for="ttl-input">TTL (seconds, 0 = no expiry)</label>
          <input type="number" id="ttl-input" value="0" min="0">
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
      </form>
    </section>

    <!-- Stored data table -->
    <section class="card">
      <h2>Stored Data</h2>
      <div class="table-actions">
        <button id="refresh-btn" class="btn btn-secondary">Refresh</button>
        <button id="clear-btn" class="btn btn-danger">Clear All</button>
        <button id="export-btn" class="btn btn-secondary">Export JSON</button>
        <button id="import-btn" class="btn btn-secondary">Import JSON</button>
      </div>
      <div class="table-wrapper">
        <table id="data-table">
          <thead>
            <tr>
              <th>Key</th>
              <th>Value</th>
              <th>Saved</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="data-body">
          </tbody>
        </table>
        <p id="empty-msg" class="empty-message">No data stored yet.</p>
      </div>
    </section>

    <!-- Activity log -->
    <section class="card">
      <h2>Activity Log</h2>
      <ul id="activity-log" class="activity-log"></ul>
    </section>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file" accept=".json" hidden>

  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
